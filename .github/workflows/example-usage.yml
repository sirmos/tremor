name: Tremor risk review
on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  tremor:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          datahub-server: ${{ secrets.DATAHUB_SERVER }}
          datahub-token: ${{ secrets.DATAHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          risk-threshold: "40"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}